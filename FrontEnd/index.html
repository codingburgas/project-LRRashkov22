<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div class="d-flex flex-column vh-100">

  <!-- HEADER -->
  <div class="text-center text-white py-4">
    <h1 class="fw-bold">Personal Finance Tracker</h1>
  </div>

  <!-- CENTER -->
  <div class="d-flex flex-grow-1 justify-content-center align-items-center">
    
    <div class="card p-4" style="width: 350px;">
      
      <h3 class="text-center mb-3">Login</h3>

      <!-- Email -->
      <input id="username" class="form-control mb-3" placeholder="Email or Username" />

      <!-- Password -->
      <input id="password" type="password" class="form-control mb-3" placeholder="Password" />

      <!-- Remember + Forgot -->
      <div class="d-flex justify-content-between mb-3">
        <div>
          <input type="checkbox" id="remember" />
          <label for="remember">Remember</label>
        </div>
        <a href="#" class="small">Forgot?</a>
      </div>

      <!-- Button -->
      <button onclick="login()" class="btn btn-success w-100 mb-3">
        Login
      </button>

      <!-- Message -->
      <p id="message" class="text-danger text-center"></p>

      <!-- Register -->
      <div class="text-center">
        <small>
          No account? <a href="#">Register</a>
        </small>
      </div>

    </div>

  </div>

</div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div class="d-flex flex-column vh-100">

  <!-- HEADER -->
  <div class="text-center text-white py-4">
    <h1 class="fw-bold text-black">Personal Finance Tracker</h1>
  </div>

  <!-- CENTER -->
  <div class="d-flex flex-grow-1 justify-content-center align-items-center">
    
    <div class="card p-4" style="width: 350px;">
      
      <div id="login-form">
        <h3 class="text-center mb-3">Login</h3>

        <input id="username" class="form-control mb-3" placeholder="Username" />
        <input id="password" type="password" class="form-control mb-3" placeholder="Password" />

        <button onclick="login()" class="btn btn-success w-100 mb-3">Login</button>

        <div class="text-center">
          <small>
            No account? <a href="#" onclick="showRegisterForm()">Register</a>
          </small>
        </div>
      </div>

      <div id="register-form" class="d-none">
        <h3 class="text-center mb-3">Register</h3>

        <input id="reg-username" class="form-control mb-3" placeholder="Username" />
        <input id="reg-password" type="password" class="form-control mb-3" placeholder="Password" />

        <button onclick="registerUser()" class="btn btn-primary w-100 mb-3">Register</button>

        <div class="text-center">
          <small>
            Already have an account? <a href="#" onclick="showLoginForm()">Login</a>
          </small>
        </div>
      </div>

      <p id="message" class="text-danger text-center"></p>

    </div>

  </div>

</div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./src/main.js"></script>
  </body>
</html>

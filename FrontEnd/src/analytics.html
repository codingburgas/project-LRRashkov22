<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <div class="sidebar">
        <div>
          <h4>PFT</h4>
          <hr />
          <a href="./dashboard.html">Dashboard</a>
          <a class="active">Analytics</a>
          <br />
          <small>MANAGEMENT</small>
          <a href="./Transaction.html">Transactions</a>
          <a href="./accounts.html">Accounts</a>
        </div>
        <a onclick="logout()">Log Out</a>
      </div>

      <!-- Main -->
      <div class="main">
        <div class="d-flex justify-content-start mb-2 gap-2">
          <input type="month" id="monthPicker" />
          <button class="btn btn-danger btn-sm" onclick="resetMonth()">
            Reset
          </button>
        </div>
        <div class="analytics-grid">
          <!-- EXPENSES -->
          <div class="analytics-row">
            <!-- TABLE -->
            <div class="card analytics-table overflow-y-auto">
              <table>
                <thead>
                  <tr>
                    <th>Category</th>
                    <th>Budget</th>
                    <th>Spent</th>
                    <th>Remaining</th>
                    <th>Progress</th>
                  </tr>
                </thead>
                <tbody
                  id="analytics-table-body"
                  class="hover-effect-tables"
                ></tbody>
              </table>
            </div>

            <!-- PIE -->
            <div class="card analytics-chart">
              <canvas id="expensePie"></canvas>
            </div>
          </div>

          <!-- INCOME -->
          <div class="analytics-row">
            <div class="card analytics-table overflow-y-auto">
              <table>
                <thead>
                  <tr>
                    <th>Category</th>
                    <th>Target</th>
                    <th>Earned</th>
                    <th>Remaining</th>
                    <th>Progress</th>
                  </tr>
                </thead>
                <tbody
                  id="analytics-table-body-target"
                  class="hover-effect-tables"
                ></tbody>
              </table>
            </div>

            <div class="card analytics-chart">
              <canvas id="incomePie"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="pages/analytics.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>

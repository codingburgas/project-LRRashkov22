<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden; /* маха scroll */
      background-color: #f5f6fa;
    }

    .app {
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 240px;
      background-color: #1e3a5f;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar a {
      color: #cfd8dc;
      display: block;
      padding: 10px;
      text-decoration: none;
      border-radius: 6px;
      margin-bottom: 5px;
    }

    .sidebar a.active,
    .sidebar a:hover {
      background-color: #2f4f6f;
      color: white;
    }

    .main {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .content {
      flex: 1;
      display: flex;
      gap: 20px;
    }

    .left {
      flex: 3;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
    }

    .card-box {
      flex: 1;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chart-box {
      flex: 1;
      min-height: 250px;
    }

    .transactions-box {
      flex: 1;
      min-height: 150px;
    }

    .fake-card {
      height: 120px;
      background: #2c3e50;
      border-radius: 12px;
    }

    .recent-transactions {
      flex: 1;
      overflow: hidden; /* без scroll */
    }

    /* прави layout-а стабилен на различни монитори */
    @media (min-width: 1400px) {
      .main {
        max-width: 1400px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <h4>PFT</h4>
      <hr>
      <a class="active">Dashboard</a>
      <a>Analytics</a>
      <br>
      <small>MANAGEMENT</small>
      <a>Transactions</a>
      <a>Cards</a>
      <a>Savings</a>
    </div>
    <a>Log Out</a>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <div class="top-bar">
      <div>
        <h3>Dashboard</h3>
        <p class="text-muted">Welcome back, User!</p>
      </div>
      <div>
        <button class="btn btn-outline-secondary">Deposit</button>
        <button class="btn btn-dark">Withdraw</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Left -->
      <div class="left">

        <!-- Cards -->
        <div class="cards">
          <div class="card card-box">Total Balance</div>
          <div class="card card-box">Income</div>
          <div class="card card-box">Expenses</div>
        </div>

        <!-- Chart -->
        <div class="card chart-box p-3">
          Financial Overview (Chart)
        </div>

        <!-- Table -->
        <div class="card transactions-box p-3">
          Expense Transactions (Table)
        </div>

      </div>

      <!-- Right -->
      <div class="right">

        <div class="card p-3">
          <div class="fake-card mb-2"></div>
          <p>Available Balance</p>
        </div>

        <div class="card recent-transactions p-3">
          Recent Transactions
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>

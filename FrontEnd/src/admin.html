<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="p-4"
    onload="
      requireAuth();
      requireAdmin();
    "
  >
    <h3>Admin - Default Categories</h3>

    <div class="mb-3">
      <input id="name" class="form-control mb-2" placeholder="Category name" />

      <select id="type" class="form-control mb-2">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>

      <input
        id="budget"
        type="number"
        class="form-control mb-2"
        placeholder="Budget"
      />

      <button onclick="createCategory()" class="btn btn-primary w-100">
        Add Category
      </button>
    </div>

    <hr />

    <div id="list"></div>
    <button onclick="logout()">Logout</button>

    <script type="module" src="main.js"></script>
  </body>
</html>

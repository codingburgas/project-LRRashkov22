<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <h4>PFT</h4>
      <hr>
      <a href="./dashboard.html">Dashboard</a>
      <a href="./analytics.html">Analytics</a>
      <br>
      <small>MANAGEMENT</small>
      <a href="./Transaction.html">Transactions</a>
      <a href="./Accounts.html" class="active">Accounts</a>
    </div>
    <a onclick="logout()">Log Out</a>
  </div>


<div class="main">

  <div class="top-bar">
    <div>
      <h3>Accounts</h3>
      <p class="text-muted">Monitor your accounts</p>
    </div>
    <button onclick="openAddAccount()" class="btn btn-dark">
      Add Account
    </button>
  </div>

  <div class="content">

    <!-- LEFT -->
    <div class="left">

      <!-- TABLE -->
      <div class="card p-3 mb-3">
        <h6>Accounts</h6>

        <table class="table">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Balance</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody id="accounts-table"></tbody>
        </table>
      </div>

      <!-- EMPTY CHART -->
      <div class="card p-3">
          <h6 id="account-chart-title">Account Overview</h6>
          <canvas id="accountLineChart" height="200"></canvas>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="card p-3">
        <h6>Account balances</h6>
        <canvas id="accountsPieChart" height="200"></canvas>
      </div>
    </div>

  </div>
</div>
</div>

<!-- Account Modal -->
<div class="modal fade" id="accountModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5>Add Account</h5>

      <input id="account-name" class="form-control mb-2" placeholder="Account Name" />

      <select id="account-type" class="form-control mb-2">
        <option value="0">Credit Card</option>
        <option value="1">Debit Card</option>
        <option value="2">Bank Account</option>
        <option value="3">Investment Account</option>
        <option value="4">Wallet</option>
      </select>

      <button onclick="submitAccount()" class="btn btn-primary">
        Save
      </button>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="pages/account.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>

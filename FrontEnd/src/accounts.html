<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <div class="sidebar">
        <div>
          <h4>PFT</h4>
          <hr />
          <a href="./dashboard.html">Dashboard</a>
          <a href="./analytics.html">Analytics</a>
          <br />
          <small>MANAGEMENT</small>
          <a href="./Transaction.html">Transactions</a>
          <a class="active">Accounts</a>
        </div>
        <a onclick="logout()">Log Out</a>
      </div>

      <div class="main">
        <div class="top-bar">
          <div>
            <h3>Accounts</h3>
            <p class="text-muted">Monitor your accounts</p>
          </div>
          <button onclick="openAddAccount()" class="btn btn-dark">
            Add Account
          </button>
        </div>

        <div class="main-acc">
          <div class="accounts-grid">
            <!-- ROW 1 -->
            <div class="accounts-row">
              <!-- TABLE -->
              <div class="card accounts-table">
                <h6 class="mx-3">Accounts</h6>
                <div class="table-container">
                  <table class="table">
                    <thead class="table-dark">
                      <tr>
                        <th>Name</th>
                        <th>Balance</th>
                        <th>Type</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody
                      id="accounts-table"
                      class="hover-effect-tables"
                    ></tbody>
                  </table>
                </div>
              </div>

              <!-- PIE -->
              <div
                class="card accounts-chart display-flex flex-column align-items-center"
              >
                <h6>Account balances</h6>
                <canvas id="accountsPieChart"></canvas>
              </div>
            </div>

            <!-- ROW 2 -->
            <div class="card accounts-line">
              <h6 id="account-chart-title" class="mx-3">Overview</h6>
              <canvas id="accountLineChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Account Modal -->
    <div class="modal fade" id="accountModal">
      <div class="modal-dialog">
        <div class="modal-content p-3">
          <h5>Add Account</h5>
          <div id="account-error" class="alert alert-danger d-none"></div>
          <input
            id="account-name"
            class="form-control mb-2"
            placeholder="Account Name"
          />

          <select id="account-type" class="form-control mb-2">
            <option value="0">Credit Card</option>
            <option value="1">Debit Card</option>
            <option value="2">Bank Account</option>
            <option value="3">Investment Account</option>
            <option value="4">Wallet</option>
          </select>

          <button onclick="submitAccount()" class="btn btn-primary">
            Save
          </button>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="pages/account.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
